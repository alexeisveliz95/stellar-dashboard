<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" type="image/svg+xml" href='{{ "favicon.svg" | relURL }}'>
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }} — Trending" href='{{ "index.xml" | relURL }}'>

  {{ partial "opengraph.html" . }}

  <link rel="stylesheet" href='{{ "css/style.css" | relURL }}'>
  {{ if or .IsHome (eq .Section "tendencias") }}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  {{ end }}
  <script src='{{ "js/dashboard.js" | relURL }}' defer></script>
  <script data-goatcounter="https://alexeisveliz95.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  {{ partial "header.html" . }}

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
