{{ $cats := hugo.Data.categorias.categories }}
<section class="search-section" id="search" data-section="search">
  <div class="search-inner">
    <label class="search-label" for="live-search">🔍 Buscar repos en vivo</label>
    <div class="search-input-wrap">
      <input
        type="search"
        id="live-search"
        class="search-input"
        placeholder="Escribe 'python', 'ai', 'blockchain'..."
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Buscar repos">
      <button type="button" id="search-clear" class="search-clear" aria-label="Limpiar búsqueda" hidden>×</button>
    </div>

    <div class="filter-chips" role="group" aria-label="Filtro por categoría">
      <span class="chip-label">Categoría:</span>
      <button type="button" class="chip chip-active" data-filter-cat="" aria-pressed="true">Todas</button>
      {{ range $cats }}
      <button type="button" class="chip" data-filter-cat="{{ .slug }}" aria-pressed="false">{{ .emoji }} {{ .name }}</button>
      {{ end }}
    </div>

    <div class="filter-toggles">
      <label class="toggle">
        <input type="checkbox" id="filter-hot"> Solo 🔥 HOT
      </label>
      <span class="result-count" id="result-count" aria-live="polite"></span>
      <button type="button" id="search-reset" class="reset-btn" hidden>↻ Reset</button>
    </div>
  </div>
</section>
