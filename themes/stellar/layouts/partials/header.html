<header class="site-header">
  <div class="container header-inner">
    <a href='{{ .Site.Home.RelPermalink }}' class="brand">
      <span class="brand-mark">✦</span>
      <span class="brand-name">{{ .Site.Title }}</span>
    </a>
    <nav class="nav">
      <a href='{{ "categorias/" | relURL }}'>Categorías</a>
      <a href='{{ "tendencias/" | relURL }}'>Tendencias</a>
      <a href='{{ .Site.Home.RelPermalink }}#trending'>Trending</a>
    </nav>
    <div class="brand-meta">
      {{ with hugo.Data.dashboard_meta }}
        {{ if .last_updated }}<span class="meta-pill">⟳ {{ .last_updated }}</span>{{ end }}
      {{ end }}
    </div>
  </div>
</header>
