<header class="site-header">
  <div class="container header-inner">
    <a href='{{ "/" | relURL }}' class="brand">
      <span class="brand-mark">✦</span>
      <span class="brand-name">{{ .Site.Title }}</span>
    </a>
    <nav class="nav">
      <a href="#trending">Trending</a>
      <a href="#quality">Top Quality</a>
      <a href="#stars">Top Stars</a>
      <a href="#curated">Curados</a>
      <a href="#categories">Categorías</a>
      <a href="#history">Historial</a>
    </nav>
    <div class="brand-meta">
      {{ with hugo.Data.dashboard_meta }}
        {{ if .last_updated }}<span class="meta-pill">⟳ {{ .last_updated }}</span>{{ end }}
      {{ end }}
    </div>
  </div>
</header>
